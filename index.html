<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Фоновое видео</title>
  <style>
    /* Заставляем видео занимать весь фон */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    video.background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* чтобы видео полностью покрывало экран */
      z-index: -1;       /* чтобы оно было позади контента */
    }

    /* Пример контента поверх видео */
    .content {
      position: relative;
      color: white;
      text-align: center;
      font-size: 2em;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>

  <!-- Видео фон -->
  <video class="background" autoplay muted loop playsinline>
    <source src="vid/car1s.webm" type="video/webm">
  </video>

  <!-- Контент поверх видео -->
  <div class="content">
    Привет! Это видео фон.
  </div>

</body>
</html>
